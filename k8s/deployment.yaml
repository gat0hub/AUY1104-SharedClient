# Misma convención que client.yaml → image-name: demo-api
# Sustituir YOUR_DOCKERHUB_USERNAME por tu usuario (igual que secret DOCKER_USERNAME).
# La receta deploy-api publica: <usuario>/demo-api:<tag> y :latest
#
# Borde HTTP: no duplicar HAProxy aquí. Aplicar primero en el cluster
# AUY1104-SharedWorkflows k8s-manifests/haproxy-academic/shared/
# (ea2-haproxy-academic). Ruta pública :30088 …/backend/* → este Service demo-api:3000.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  labels:
    app: demo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      containers:
        - name: api
          image: asanchezoduoc/demo-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
